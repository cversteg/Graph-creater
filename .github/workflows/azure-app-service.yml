# Deploy Streamlit app to Azure App Service (Linux, F1 free tier from terraform/).
#
# One-time Azure setup (OpenID Connect — no long-lived deploy password):
# 1. In Microsoft Entra ID: App registration → Certificates & secrets → Federated credentials
#    → Add: GitHub Actions deploying in this repo, entity type "Branch", branch "main" (or "master").
# 2. Subscription → Access control (IAM) → Add role assignment: "Website Contributor" (or "Contributor")
#    on the resource group from `terraform output resource_group_name`, principal = that app registration.
# 3. GitHub repo → Settings → Secrets and variables → Actions → New repository secrets:
#    AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID (from the app registration + subscription).
# 4. Optional repository variables to override defaults if you changed terraform `project` / `environment`:
#    AZURE_WEBAPP_NAME, AZURE_RESOURCE_GROUP (defaults match variable defaults in terraform/variables.tf).

name: Azure App Service

on:
  push:
    branches:
      - main
      - master

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    env:
      AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME || 'scatter-app-prod-wa' }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'scatter-app-prod-rg' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: Azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ env.AZURE_RESOURCE_GROUP }}
          package: .
